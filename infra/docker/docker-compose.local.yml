services:
  postgres:
    image: postgres:16-alpine
    container_name: suzi-chat-postgres-local
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-suzi_chat}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - suzi_chat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-suzi_chat}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional local TURN/STUN for testing WebRTC calls behind NAT. Calls between
  # two browsers on the same machine work without it (host candidates).
  coturn:
    image: coturn/coturn:4.6
    container_name: suzi-chat-coturn-local
    restart: unless-stopped
    profiles: ["turn"]
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49160-49200:49160-49200/udp"
    volumes:
      - ../coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: >
      -c /etc/coturn/turnserver.conf
      --static-auth-secret=${TURN_SECRET:-local-dev-turn-secret}
      --realm=${TURN_REALM:-localhost}

  livekit:
    image: livekit/livekit-server:latest
    container_name: suzi-chat-livekit-local
    restart: unless-stopped
    profiles: ["live"]
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-suzi_livekit_dev}: ${LIVEKIT_API_SECRET:-local-dev-livekit-secret}"
    command: >
      --dev
      --bind 0.0.0.0
      --node-ip=${LIVEKIT_NODE_IP:-127.0.0.1}
    ports:
      - "7880:7880/tcp"
      - "7881:7881/tcp"
      - "7882:7882/udp"

volumes:
  suzi_chat_postgres_data:
