# Suzi Chat TURN/STUN server (coturn).
#
# Secret, realm and external IP are injected at runtime by docker-compose
# (--static-auth-secret / --realm / --external-ip) so no credentials live here.

listening-port=3478

# Ephemeral REST credentials (HMAC of "<expiry>:<userId>"), matched by the API.
use-auth-secret

# Relay port range. MUST match the published UDP ports in docker-compose.
min-port=49160
max-port=49200

fingerprint
no-cli
no-multicast-peers

# Do not relay to private/internal ranges (SSRF hardening).
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# V1 runs TURN without TLS; media stays encrypted via DTLS-SRTP regardless.
# Add tls-listening-port + cert/pkey here to enable turns:// later.
