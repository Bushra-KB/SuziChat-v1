services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-suzi_chat}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - suzi_chat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-suzi_chat}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      UPLOADS_DIR: /app/uploads
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-suzi_chat}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      PASSWORD_RESET_TTL_MINUTES: ${PASSWORD_RESET_TTL_MINUTES:-30}
      EMAIL_VERIFICATION_TTL_MINUTES: ${EMAIL_VERIFICATION_TTL_MINUTES:-1440}
      APP_BASE_URL: ${APP_BASE_URL:-https://${SUZI_DOMAIN}}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      MAIL_FROM: ${MAIL_FROM:-Suzi Chat <no-reply@${SUZI_DOMAIN}>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      ARGON2_TIME_COST: ${ARGON2_TIME_COST:-3}
      ARGON2_MEMORY_COST: ${ARGON2_MEMORY_COST:-65536}
      ARGON2_PARALLELISM: ${ARGON2_PARALLELISM:-1}
      CORS_ORIGINS: ${CORS_ORIGINS}
      STUN_URLS: ${STUN_URLS:-stun:stun.l.google.com:19302}
      TURN_URLS: ${TURN_URLS:-}
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_REALM: ${TURN_REALM:-${SUZI_DOMAIN}}
      TURN_TTL_SECONDS: ${TURN_TTL_SECONDS:-3600}
      ROOM_CALL_MAX: ${ROOM_CALL_MAX:-6}
      LIVEKIT_URL: ${LIVEKIT_URL:-wss://${SUZI_DOMAIN}/livekit}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
    volumes:
      - suzi_chat_api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  coturn:
    image: coturn/coturn:4.6
    restart: unless-stopped
    # Host networking is the most reliable setup for TURN media relay.
    network_mode: host
    volumes:
      - ../coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: >
      -c /etc/coturn/turnserver.conf
      --static-auth-secret=${TURN_SECRET}
      --realm=${TURN_REALM:-${SUZI_DOMAIN}}
      --external-ip=${TURN_EXTERNAL_IP}

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-suzi_livekit_dev}: ${LIVEKIT_API_SECRET:-replace-with-livekit-secret}"
    command: >
      --dev
      --bind 0.0.0.0
      --node-ip=${LIVEKIT_NODE_IP:-${TURN_EXTERNAL_IP}}
    ports:
      - "7881:7881/tcp"
      - "7882:7882/udp"

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        API_PROXY_TARGET: http://api:4000
        NEXT_PUBLIC_ADS_ENABLED: ${NEXT_PUBLIC_ADS_ENABLED:-false}
        NEXT_PUBLIC_EXOCLICK_ZONE_BANNER_TOP: ${NEXT_PUBLIC_EXOCLICK_ZONE_BANNER_TOP:-}
        NEXT_PUBLIC_EXOCLICK_ZONE_BANNER_BOTTOM: ${NEXT_PUBLIC_EXOCLICK_ZONE_BANNER_BOTTOM:-}
        NEXT_PUBLIC_EXOCLICK_ZONE_REELS: ${NEXT_PUBLIC_EXOCLICK_ZONE_REELS:-}
        NEXT_PUBLIC_EXOCLICK_ZONE_SNAPS: ${NEXT_PUBLIC_EXOCLICK_ZONE_SNAPS:-}
        NEXT_PUBLIC_EXOCLICK_ZONE_DATING: ${NEXT_PUBLIC_EXOCLICK_ZONE_DATING:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PROXY_TARGET: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SUZI_DOMAIN: ${SUZI_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
      - livekit

volumes:
  suzi_chat_postgres_data:
  suzi_chat_api_uploads:
  caddy_data:
  caddy_config:
